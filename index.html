<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DearieBits</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }

    header img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 15px;
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(255,255,255,0.2); }
      to { box-shadow: 0 0 30px rgba(255,255,255,0.6); }
    }

    header h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #a5f3fc, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      opacity: 0.8;
      margin-top: 10px;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      transition: 0.3s;
      transform: scale(1.05);
    }

    .card-content {
      padding: 20px;
      text-align: center;
    }

    .card-content h3 {
      margin-bottom: 10px;
    }

    .price {
      font-size: 20px;
      margin: 10px 0;
      color: #67e8f9;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
      font-size: 14px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #4ade80;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
      opacity: 0.7;
    }

    .slider {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    }

  .slider img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: none;
    }

  .slider img.active {
    display: block;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.jpeg.jpeg" alt="DearieBits Logo">
  <h1>DearieBits</h1>
  <p>Premium Handmade Keychain ✨</p>
</header>

<section class="container">

  <div class="card">

    <div class="slider">
      <img src="10k.jpeg" class="active">
      <img src="10K-pinkstar.jpeg" >
      <img src="10K-whitestar.jpeg" >
    </div>

    <div class="card-content">
      <h3>Keychain Basic</h3>
      <p class="price">Rp 10.000</p>
      <a class="btn" href="https://wa.me/6282176124002?text=Halo%20saya%20ingin%20pesan%20Keychain%20Basic%20DearieBits">Order Now</a>
    </div>
  </div>

  <div class="card">

    <div class="slider">
    <img src="15K.jpeg" class="active">
    <img src="15K-pink.jpeg" >
    <img src="15K-silver.jpeg" >
    <img src="15K-star.jpeg" >
    </div>

    <div class="card-content">
      <h3>Keychain Custom</h3>
      <p class="price">Rp 15.000</p>
      <a class="btn" href="https://wa.me/6282176124002?text=Halo%20saya%20ingin%20pesan%20Keychain%20Custom%20DearieBits">Order Now</a>
    </div>
  </div>

  <div class="card">

    <div class="slider">
      <img src="25K.jpeg" class="active">
      <img src="25K-bintang.jpeg" >
      <img src="25K-obeng.jpeg" >
    </div>

    <div class="card-content">
      <h3>Keychain Premium</h3>
      <p class="price">Rp 25.000</p>
      <a class="btn" href="https://wa.me/6282176124002?text=Halo%20saya%20ingin%20pesan%20Keychain%20Premium%20DearieBits">Order Now</a>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 DearieBits | Handmade with ❤️</p>

</footer>
<div id="popup" onclick="closeImage()" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <img id="popup-img" style="max-width:90%; max-height:90%; border-radius:10px;">
  </div>
  <script>
  function openImage(src) {
    document.getElementById('popup').style.display = 'flex';
    document.getElementById('popup-img').src = src;
  }

  function closeImage() {
    document.getElementById('popup').style.display = 'none';
  }
  let sliders = document.querySelectorAll('.slider');

  sliders.forEach(slider => {
    let images = slider.querySelectorAll('img');
    let index = 0;

    setInterval(() => {
      images[index].classList.remove('active');
      index = (index + 1) % images.length;
      images[index].classList.add('active');
    }, 2000);
  });
</script>
    </body>
</html>
